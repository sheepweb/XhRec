name: Build and Publish ShadowJar Pre-release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: chmod
        run: chmod +x gradlew

      - name: Validate Gradle wrapper
        uses: gradle/gradle-build-action@v2
        with:
          arguments: help --no-daemon

      - name: Build with Gradle
        uses: gradle/gradle-build-action@v2
        with:
          arguments: shadowJar --no-daemon

      - name: Pack browser extension
        run: tar -cvf extension.tar extension

      - name: Update dev-build tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa dev-build -m "CI prerelease tag"
          git push --force origin refs/tags/dev-build

      - name: Create Pre-release and Upload Asset
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: dev-build
          target_commitish: ${{ github.sha }}
          name: CI builds
          draft: false
          prerelease: true
          files: |
            build/libs/*-all.jar
            extension.tar
          overwrite_files: true
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_TOKEN }}