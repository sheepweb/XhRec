name: Build and Publish ShadowJar Pre-release

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'zulu'
          cache: 'gradle'

      - name: chmod
        run: chmod +x gradlew

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Validate Gradle wrapper
        run: ./gradlew help --no-daemon

      - name: Build with Gradle
        run: ./gradlew shadowJar --no-daemon

      - name: Pack browser extension
        run: tar -cvf extension.tar extension

      - name: Delete existing dev-build releases
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          set -euo pipefail
          gh api "repos/${GITHUB_REPOSITORY}/releases" --paginate \
            --jq '.[] | select(.tag_name == "dev-build") | .id' |
          while read -r release_id; do
            if [ -n "$release_id" ]; then
              echo "Deleting release id=$release_id for tag dev-build"
              gh api --method DELETE "repos/${GITHUB_REPOSITORY}/releases/${release_id}"
            fi
          done

      - name: Update dev-build tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -d dev-build || true
          git tag dev-build "${GITHUB_SHA}"
          git push --force origin refs/tags/dev-build

      - name: Create Pre-release and Upload Asset
        if: success()
        env:
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN || github.token }}
        run: |
          gh release create dev-build \
            build/libs/*-all.jar \
            extension.tar \
            --title "CI builds" \
            --target "${GITHUB_SHA}" \
            --prerelease \
            --generate-notes
